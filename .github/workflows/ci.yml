name: Quality Gate

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    env:
      MYPY_CACHE_DIR: build/mypy-cache
      RUFF_NO_CACHE: "true"
      TEMP: ${{ github.workspace }}/build/tmp
      TMP: ${{ github.workspace }}/build/tmp
      TMPDIR: ${{ github.workspace }}/build/tmp

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Prepare workspace temp directories
        run: python -c "from pathlib import Path; [Path(path).mkdir(parents=True, exist_ok=True) for path in ('build/tmp', 'build/mypy-cache', 'build/ruff-cache', 'build/pytest-temp')]"

      - name: Verify environment
        run: python -m pip check

      - name: Check formatting
        run: python -m ruff format --check src tests

      - name: Lint code
        run: python -m ruff check src tests

      - name: Type-check source
        run: python -m mypy

      - name: Build distributables
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-python312
          path: dist/

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    env:
      TEMP: ${{ github.workspace }}/build/tmp
      TMP: ${{ github.workspace }}/build/tmp
      TMPDIR: ${{ github.workspace }}/build/tmp
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Prepare workspace temp directories
        run: python -c "from pathlib import Path; [Path(path).mkdir(parents=True, exist_ok=True) for path in ('build/tmp', 'build/pytest-temp')]"

      - name: Run tests
        run: python -m pytest
