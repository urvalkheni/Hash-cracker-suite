name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt
            requirements.txt

      - name: Validate release tag and package version
        id: release_meta
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          import subprocess
          import tomllib

          ref_type = os.environ["GITHUB_REF_TYPE"]
          if ref_type != "tag":
              raise SystemExit("Release workflow must run from a semantic version tag.")

          tag = os.environ["GITHUB_REF_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"Tag '{tag}' is not valid semver. Use vMAJOR.MINOR.PATCH.")

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          if version != tag.removeprefix("v"):
              raise SystemExit(
                  f"pyproject version '{version}' does not match release tag '{tag}'."
              )

          sha = os.environ["GITHUB_SHA"]
          default_branch = os.environ["DEFAULT_BRANCH"]
          branches = subprocess.check_output(
              ["git", "branch", "-r", "--contains", sha],
              text=True,
          )
          if f"origin/{default_branch}" not in branches:
              raise SystemExit(
                  f"Tagged commit {sha} is not contained in origin/{default_branch}."
              )

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"tag={tag}\n")
              handle.write(f"version={version}\n")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Build distributions
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error

  attest-build:
    name: Attest Build Provenance
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs:
      - build-release
      - attest-build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hash-cracker-suite
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Create GitHub Release
    needs:
      - build-release
      - publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs['build-release'].outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --generate-notes --title "$RELEASE_TAG"
          fi
